<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Silicon Valley Agentics Meetup</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#FAF9F6;--ink:#1A1A1A;--gray:#6B7280;--coral:#FF6847;--coral-deep:#E5502F;
    --mono:'IBM Plex Mono',Consolas,monospace;--sans:'Archivo',Calibri,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;line-height:1.5}
  .code{font-family:var(--mono);font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--coral)}
  .code::before{content:"> "}
  h1{font-weight:900;font-size:clamp(40px,9vw,72px);letter-spacing:-.03em;margin:14px 0 10px}
  p{color:var(--gray);font-size:17px;max-width:44ch;margin:0 auto 30px}
  a.btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:600;font-size:16px;
    background:var(--coral);color:#fff;text-decoration:none;padding:15px 28px;border-radius:8px;transition:background .18s ease}
  a.btn:hover{background:var(--coral-deep)}
</style>
</head>
<body>
  <main>
    <p class="code">Error 404</p>
    <h1>Page not found</h1>
    <p>That page doesn't exist — but the meetup is very real. Head back to the event.</p>
    <a class="btn" href="/">Back to the meetup →</a>
  </main>
</body>
</html>
